# ╔══════════════════════════════════════════════════════╗
# ║           IkokoGPT — Configuration                   ║
# ╚══════════════════════════════════════════════════════╝
#
# Edit this file to customise the model.
# No code changes needed!
#
# To train :  python train.py
# To chat  :  python chat.py

# ─── Project ──────────────────────────────────────────────────────────────────
# Each project has its own folder in checkpoints/ with its own model & tokenizer.
# Switch project name to train/chat a different model without losing the old one.
project: "english_bot"                        # e.g. "french_bot", "english_bot", "myproject"

# ─── Data ─────────────────────────────────────────────────────────────────────
data:
  train_file      : "data/train.txt"        # training text file
  tokenizer_kind  : "bpe"                   # "char" (simple) or "bpe" (better on large corpora)
  user_prefix     : "You"                   # prefix for user turns  ("Toi" for French, "You" for English)
  bot_prefix      : "GPT"                   # prefix for bot turns

# ─── Model Architecture ───────────────────────────────────────────────────────
model:
  d_model   : 256    # embedding dimension     (e.g. 256, 384, 512, 768)
  n_heads   : 4      # attention heads          (must divide d_model)
  n_layers  : 4      # transformer blocks       (e.g. 4, 6, 8, 12)
  seq_len   : 128    # longer context to better capture dialogues
  dropout   : 0.3    # stronger dropout to fight overfitting

# ─── Training ─────────────────────────────────────────────────────────────────
train:
  batch_size      : 32       # examples per step (reduce if OOM)
  grad_accum      : 1        # effective batch = batch_size × grad_accum
  learning_rate   : 3e-4     # maximum LR
  min_lr          : 1e-5     # minimum LR (end of cosine decay)
  warmup_iters    : 200      # linear warmup steps
  max_iters       : 20000    # total number of steps
  weight_decay    : 0.1      # L2 regularisation anti-overfitting
  grad_clip       : 1.0      # gradient clipping
  beta1           : 0.9      # AdamW beta1
  beta2           : 0.95     # AdamW beta2

# ─── Evaluation & Checkpointing ───────────────────────────────────────────────
eval:
  eval_every      : 500      # evaluate every N steps
  eval_iters      : 50       # batches to estimate val_loss
  save_every      : 2000     # save checkpoint every N steps
  generate_every  : 2000     # generate sample text every N steps
  # checkpoint paths are auto-built from project name — no need to set them here

# ─── Generation during training ───────────────────────────────────────────────
generate:
  # prompt is auto-built from data.user_prefix / data.bot_prefix — no need to set it here
  greeting    : "hello"              # greeting word used in the test prompt ("salut" for French)
  length      : 150                  # number of tokens to generate
  temperature : 0.8                  # creativity (0.3=precise, 1.5=creative)

# ─── Early Stopping ───────────────────────────────────────────────────────────
early_stopping:
  patience    : 20    # stop if val_loss doesn't improve for N evaluations

# ─── Chat (default parameters) ────────────────────────────────────────────────
chat:
  temperature : 0.7    # response creativity (0.3=precise, 1.0=creative)
  top_k       : 40     # top-k sampling (choice diversity)
  top_p       : 0.9    # nucleus sampling
  max_new     : 120    # max response length (in tokens)
  rep_penalty : 1.1    # repetition penalty (1.0 = disabled)

# ─── Recommended GPU presets ──────────────────────────────────────────────────
# Uncomment and copy values based on your GPU:
#
# 🟢 RTX 4070 / 3080 (12GB) — current config
#   d_model=512, n_heads=8, n_layers=8, seq_len=256, batch_size=64
#
# 🟡 RTX 3060 / 2070 (8GB)
#   d_model=384, n_heads=6, n_layers=6, seq_len=128, batch_size=32
#
# 🔴 GTX 1060 / CPU (4-6GB)
#   d_model=256, n_heads=4, n_layers=4, seq_len=128, batch_size=16
#
# 🔵 RTX 4090 / A100 (24GB+)
#   d_model=768, n_heads=12, n_layers=12, seq_len=512, batch_size=128
